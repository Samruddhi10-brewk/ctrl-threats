user nginx;
worker_processes auto;
 
events {
    worker_connections 4096;
}
 
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
 
    sendfile on;
    keepalive_timeout 65;
 
    upstream django_app {
        server django:8000;
    }
 
    upstream flask_scan {
        server web_scan_flaskapp:8001;
    }
 
    upstream phishing_email {
        server email_phising_flaskapp:5000;
    }
 
    upstream frontend_app {
        server frontend:80;
    }
 
    server {
        listen 80;
 
        location / {
            proxy_pass http://frontend_app;
        }
 
        location /api/ {
            proxy_pass http://django;
        }
 
        location /scan/ {
            proxy_pass http://flask_scan/;
        }
 
        location /email-phishing/ {
            proxy_pass http://phishing_email/;
        }
    }
}