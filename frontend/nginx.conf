user nginx;
worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    upstream django_app {
        server django:8000;
    }

    upstream flask_scan {
        server web_scan_flaskapp:8001;
    }

    upstream phishing_email {
        server email_phising_flaskapp:5000;
    }

    upstream frontend_app {
        server frontend:3000;
    }

    # HTTP redirect
    server {
        listen 80;
        server_name ctrlthreats.com www.ctrlthreats.com;
        return 301 https://$host$request_uri;
    }

    # HTTPS (Cloudflare Strict)
    server {
        listen 443 ssl http2;
        server_name ctrlthreats.com www.ctrlthreats.com;

        ssl_certificate /etc/nginx/ssl/cloudflare.crt;
        ssl_certificate_key /etc/nginx/ssl/cloudflare.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;

        # FRONTEND
        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }

        # DJANGO
        location /api/ {
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
        }

        # FLASK SCAN
        location /scan/ {
            proxy_pass http://flask_scan/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }

        # EMAIL SERVICE
        location /email-phishing/ {
            proxy_pass http://phishing_email/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}